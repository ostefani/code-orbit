# Context window in tokens — match your model's actual context size
max_context_tokens: 16384
max_response_tokens: 16384

# Profiles: select with --profile / -P
# 'default_profile' is used when no --profile flag is passed.
default_profile: 'qwen-coder'

profiles:
    ollama:
        api_base: 'http://localhost:11434/v1' # Default Ollama port
        model: 'qwen2.5-coder:32b' # Change to your local model name
        max_context_tokens: 32768
    lm-studio:
        api_base: 'http://localhost:1234/v1' # Default LM Studio port
        model: 'model-identifier-here'
        max_context_tokens: 32768
    gpt-oss-20:
        model: 'gpt-oss-20'
        max_context_tokens: 32768
        tokenizer_backend: 'tokenizers_json'
        tokenizer_model_path: ~/.llamacpp_models/ggufs/gpt-oss-20b/tokenizer.json
    qwen-coder:
        model: 'qwen-coder'
        max_context_tokens: 32768
        tokenizer_backend: 'tokenizers_json'
        tokenizer_model_path: ~/.llamacpp_models/ggufs/Qwen3-Coder-Instruct-30b/tokenizer.json
    gemma-e4b:
        model: 'gemma-4-E4B-it-f16.gguf'
        max_context_tokens: 32768
        max_response_tokens: 16384
        tokenizer_backend: tokenizers_json
        tokenizer_model_path: ~/.llamacpp_models/ggufs/gemma-4-E4B-it/tokenizer.json
    gemma-4-26B:
        model: 'gemma-4-26B'
        max_context_tokens: 32768
        max_response_tokens: 16384
        tokenizer_backend: tokenizers_json
        tokenizer_model_path: ~/.llamacpp_models/ggufs/gemma-4-26B-A4B-it/tokenizer.json

# Pause and show diffs before applying changes
interactive: true
