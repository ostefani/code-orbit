# Context window in tokens — match your model's actual context size
max_context_tokens: 16384
max_response_tokens: 16384

# Profiles: select with --profile or -P
default_profile: 'qwen'

profiles:
    gpt-oss-20:
        model: 'gpt-oss-20'
        max_context_tokens: 32768
        tokenizer_backend: 'tokenizers_json'
        tokenizer_model_path: ~/.llamacpp_models/ggufs/gpt-oss-20b/tokenizer.json
    gemma-e4b:
        model: 'gemma-4-E4B-it-f16.gguf'
        max_context_tokens: 32768
        max_response_tokens: 16384
        tokenizer_backend: tokenizers_json
        tokenizer_model_path: ~/.llamacpp_models/ggufs/gemma-4-E4B-it/tokenizer.json

# Pause and show diffs before applying changes
interactive: true
