name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build-binaries:
        name: Build Binary (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      artifact_name: code-orbit-linux
                      asset_name: code-orbit-linux
                    - os: windows-latest
                      artifact_name: code-orbit.exe
                      asset_name: code-orbit-windows.exe

        steps:
            - uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.14'
                  cache: 'pip'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pyinstaller

            - name: Build with PyInstaller
              run: |
                  pyinstaller --onefile --name code-orbit main.py

            - name: Rename binary
              shell: bash
              run: |
                  if [ "${{ matrix.os }}" = "windows-latest" ]; then
                    mv dist/code-orbit.exe dist/${{ matrix.asset_name }}
                  else
                    mv dist/code-orbit dist/${{ matrix.asset_name }}
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v6
              with:
                  name: ${{ matrix.asset_name }}
                  path: dist/${{ matrix.asset_name }}

    create-release:
        name: Create GitHub Release
        needs: build-binaries
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Download all artifacts
              uses: actions/download-artifact@v7
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Build Python packages
              run: |
                  python -m pip install --upgrade pip
                  pip install build
                  python -m build

            - name: Generate changelog
              uses: orhun/git-cliff-action@v4
              id: cliff
              with:
                  config: cliff.toml
                  args: --latest --strip header
              env:
                  OUTPUT: CHANGELOG.md

            - name: Release
              uses: softprops/action-gh-release@v3
              with:
                  body: ${{ steps.cliff.outputs.content }}
                  files: |
                      dist/*.whl
                      dist/*.tar.gz
                      artifacts/*
                  draft: false
                  prerelease: false
