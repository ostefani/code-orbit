<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bcff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="256" cy="256" r="200" stroke="url(#orbitGradient)" stroke-width="40" fill="transparent" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" stroke="#00ff88" stroke-width="2" fill="transparent" stroke-dasharray="10 20" opacity="0.5" />
</svg>
